quarkus.application.name=sga-backend
quarkus.http.port=${PORT:8080}
quarkus.http.root-path=/

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:sga}
quarkus.datasource.password=${DB_PASSWORD:sga}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sga}

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

sga.jwt.secret=${JWT_SECRET:troque-este-segredo-em-producao-com-pelo-menos-32-caracteres}
sga.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:28800}
sga.admin.email=${ADMIN_EMAIL:admin@sga.local}
sga.admin.password=${ADMIN_PASSWORD:admin123}
sga.upload.dir=${SGA_UPLOAD_DIR:uploads}
sga.upload.max-bytes=${SGA_UPLOAD_MAX_BYTES:10485760}
sga.academico.media-minima=${SGA_MEDIA_MINIMA:7.0}
sga.academico.frequencia-minima=${SGA_FREQUENCIA_MINIMA:75.0}
sga.seed.homologacao.enabled=${SGA_SEED_HOMOLOGACAO:false}

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:sga;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.database.generation=drop-and-create
