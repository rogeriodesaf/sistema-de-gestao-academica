<main class="login recuperacao-senha">
  <button type="button" class="alternar-tema" (click)="tema.alternar()" [attr.aria-label]="tema.tema === 'claro' ? 'Ativar modo escuro' : 'Ativar modo claro'" [attr.title]="tema.tema === 'claro' ? 'Ativar modo escuro' : 'Ativar modo claro'">
    <span aria-hidden="true">{{ tema.tema === 'claro' ? '☾' : '☀' }}</span>
  </button>
  <section>
    <div class="marca">
      <img src="/logo-seminario.webp" alt="Seminário Teológico Congregacional de João Pessoa">
      <strong>{{ redefinindo ? 'Redefinir senha' : 'Recuperar acesso' }}</strong>
    </div>

    <form *ngIf="!redefinindo" (ngSubmit)="enviarInstrucoes()">
      <p>Informe o e-mail cadastrado para receber as instruções de redefinição.</p>
      <label>
        E-mail
        <input name="email" type="email" [(ngModel)]="email" autocomplete="email" required>
      </label>
      <p class="sucesso" *ngIf="mensagem()">{{ mensagem() }}</p>
      <button type="submit" [disabled]="carregando()">
        {{ carregando() ? 'Enviando...' : 'Enviar instruções' }}
      </button>
      <a routerLink="/login">Voltar para o login</a>
    </form>

    <form *ngIf="redefinindo && !concluido()" (ngSubmit)="redefinirSenha()">
      <label>
        Nova senha
        <input name="novaSenha" type="password" [(ngModel)]="novaSenha" autocomplete="new-password" minlength="8" required>
      </label>
      <label>
        Confirmar nova senha
        <input name="confirmacaoSenha" type="password" [(ngModel)]="confirmacaoSenha" autocomplete="new-password" minlength="8" required>
      </label>
      <p class="erro" *ngIf="erro()">{{ erro() }}</p>
      <button type="submit" [disabled]="carregando() || !token">
        {{ carregando() ? 'Redefinindo...' : 'Redefinir senha' }}
      </button>
      <a routerLink="/login">Voltar para o login</a>
    </form>

    <div class="resultado" *ngIf="redefinindo && concluido()">
      <p class="sucesso">{{ mensagem() }}</p>
      <a class="botao-link" routerLink="/login">Voltar para o login</a>
    </div>
  </section>
</main>
