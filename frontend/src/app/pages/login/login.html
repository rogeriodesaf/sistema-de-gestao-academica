<main class="login">
  <section>
    <div class="marca">
      <strong>SGA</strong>
      <span>Sistema de Gestao Academica</span>
    </div>
    <form (ngSubmit)="entrar()">
      <label>
        E-mail
        <input name="email" type="email" [(ngModel)]="email" required>
      </label>
      <label>
        Senha
        <input name="senha" type="password" [(ngModel)]="senha" required>
      </label>
      <p class="erro" *ngIf="erro">{{ erro }}</p>
      <button type="submit" [disabled]="carregando">{{ carregando ? 'Entrando...' : 'Entrar' }}</button>
    </form>
  </section>
</main>
