<main class="login">
  <button type="button" class="alternar-tema" (click)="tema.alternar()">Modo {{ tema.tema === 'claro' ? 'escuro' : 'claro' }}</button>
  <section>
    <div class="marca">
      <img src="/logo-seminario.webp" alt="Seminário Teológico Congregacional de João Pessoa" (error)="$any($event.target).style.display='none'">
      <strong>Sistema de Gestão Acadêmica</strong>
    </div>
    <form (ngSubmit)="entrar()" autocomplete="on">
      <label>
        E-mail
        <input name="email" type="email" [(ngModel)]="email" autocomplete="username" aria-describedby="erro-login" autofocus required>
      </label>
      <label>
        Senha
        <input name="senha" type="password" [(ngModel)]="senha" autocomplete="current-password" aria-describedby="erro-login" required>
      </label>
      <p id="erro-login" class="erro" role="alert" *ngIf="erro">{{ erro }}</p>
      <button type="submit" [disabled]="carregando">{{ carregando ? 'Entrando...' : 'Entrar' }}</button>
      <a class="recuperar-senha" routerLink="/esqueci-senha">Esqueci minha senha</a>
    </form>
  </section>
</main>
