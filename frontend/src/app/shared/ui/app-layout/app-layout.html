<div class="shell" [class.menu-aberto]="menuAberto" [class.sem-menu]="!usuario">
  <app-sidebar *ngIf="usuario" class="sidebar-desktop" [grupos]="menuGrupos" />

  <button
    type="button"
    class="menu-overlay"
    aria-label="Fechar menu"
    *ngIf="usuario && menuAberto"
    (click)="fecharMenu()"
  ></button>

  <div #menuMobile *ngIf="usuario" class="menu-mobile" [class.aberto]="menuAberto" role="dialog" aria-modal="true" [attr.aria-hidden]="!menuAberto" aria-label="Menu principal" tabindex="-1">
    <app-sidebar [grupos]="menuGrupos" [mobile]="true" (navegar)="fecharMenu()" />
  </div>

  <main class="conteudo">
    <app-topbar *ngIf="usuario" [usuario]="usuario" (abrirMenu)="abrirMenu()" (sair)="emitirSair()" />
    <router-outlet />
    <footer class="rodape">© {{ anoAtual }} Rogério de Sá - Engenharia de Softwares</footer>
  </main>
</div>
