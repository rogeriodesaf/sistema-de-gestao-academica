<header class="topbar">
  <button type="button" class="botao-menu" aria-label="Abrir menu" (click)="abrirMenu.emit()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="marca-mobile">
    <img src="/logo-seminario.webp" alt="Seminário Teológico Congregacional de João Pessoa" (error)="$any($event.target).style.display='none'">
    <strong>SGA</strong>
  </div>

  <div class="usuario-topbar">
    <span>{{ perfilDescricao }}</span>
    <strong>{{ usuario?.nome }}</strong>
    <span>{{ usuario?.email }}</span>
  </div>
  <button type="button" class="botao-tema" (click)="tema.alternar()" [attr.aria-pressed]="tema.tema === 'escuro'" [attr.aria-label]="tema.tema === 'claro' ? 'Ativar modo escuro' : 'Ativar modo claro'" [attr.title]="tema.tema === 'claro' ? 'Ativar modo escuro' : 'Ativar modo claro'">
    <span aria-hidden="true">{{ tema.tema === 'claro' ? '☾' : '☀' }}</span>
  </button>
  <button type="button" class="botao-sair" (click)="sair.emit()">Sair</button>
</header>
