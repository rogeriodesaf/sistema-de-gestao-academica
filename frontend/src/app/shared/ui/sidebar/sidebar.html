<aside class="sidebar" [class.sidebar-mobile]="mobile">
  <div class="brand">
    <span class="brand-selo">SGA</span>
    <div>
      <strong>SGA</strong>
      <span>Sistema de Gestao Academica</span>
    </div>
  </div>

  <nav aria-label="Menu principal">
    <section *ngFor="let grupo of grupos" class="menu-grupo">
      <h2>{{ grupo.titulo }}</h2>
      <a *ngFor="let item of grupo.itens" [routerLink]="item.path" routerLinkActive="ativo" (click)="navegar.emit()">
        <span class="menu-icone" aria-hidden="true"><app-menu-icon [nome]="item.icone" /></span>
        {{ item.label }}
      </a>
    </section>
  </nav>
</aside>
